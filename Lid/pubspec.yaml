name: 39am
description: تطبيق إدارة حسابات مشتركين كهرباء بدون اتصال بالإنترنت مع استيراد/تصدير Excel وتقارير
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.0.0+4
  path_provider: ^2.0.11
  path: ^1.8.3
  file_picker: ^5.2.3
  excel: ^2.0.2
  permission_handler: ^10.2.0
  share_plus: ^6.3.0
  fl_chart: ^0.55.2
  pdf: ^3.10.1
  printing: ^5.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
